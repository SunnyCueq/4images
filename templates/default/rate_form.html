<form method="post" action="{self}" class="d-inline-block">
  <div class="d-flex align-items-center gap-2">
    <i class="fa-solid fa-star text-warning fa-lg"></i>
    <select name="rating" class="form-select form-select-sm" style="width: auto;" required>
      <option value="">-- {rate} --</option>
      <option value="5">★★★★★ (5)</option>
      <option value="4">★★★★☆ (4)</option>
      <option value="3">★★★☆☆ (3)</option>
      <option value="2">★★☆☆☆ (2)</option>
      <option value="1">★☆☆☆☆ (1)</option>
    </select>
    <input type="hidden" name="action" value="rateimage" />
    <input type="hidden" name="id" value="{image_id}" />
    <button type="submit" class="btn btn-primary btn-sm">
      <i class="fa-solid fa-paper-plane"></i> {rate}
    </button>
  </div>
</form>
