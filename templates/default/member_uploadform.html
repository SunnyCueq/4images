<form method="post" action="{url_member}" enctype="multipart/form-data" onsubmit="uploadbutton.disabled=true;">
  <input type="hidden" name="action" value="uploadimage" />
  {if cat_id}<input type="hidden" name="cat_id" value="{cat_id}" />{endif cat_id}
  
  <div class="card shadow-sm">
    <div class="card-header bg-success text-white">
      <h2 class="h5 mb-0">
        <i class="fa-solid fa-cloud-arrow-up me-2"></i>{lang_user_upload}
      </h2>
    </div>
    <div class="card-body">
      
      <!-- Category -->
      <div class="mb-4 row">
        <label class="col-sm-3 col-form-label fw-bold">
          <i class="fa-solid fa-folder me-1"></i>{lang_category}
        </label>
        <div class="col-sm-9">
          <div class="form-control-plaintext fw-bold text-primary">{cat_name}</div>
        </div>
      </div>
      
      <!-- Media File -->
      <div class="mb-4 row">
        <label class="col-sm-3 col-form-label fw-bold align-self-start">
          <i class="fa-solid fa-file-image me-1"></i>{lang_media_file}
          <div class="small fw-normal text-muted mt-2">
            {lang_max_filesize}<strong>{max_media_filsize}</strong><br>
            {lang_max_imagewidth}<strong>{max_media_imagewidth}</strong><br>
            {lang_max_imageheight}<strong>{max_media_imageheight}</strong>
          </div>
        </label>
        <div class="col-sm-9">
          <label for="media_file" class="form-label"><strong>Upload:</strong></label>
          <input type="file" name="media_file" id="media_file" class="form-control mb-3">
          
          <label for="remote_media_file" class="form-label"><strong>URL:</strong></label>
          <input type="url" name="remote_media_file" id="remote_media_file" class="form-control mb-2" value="{remote_media_file}" placeholder="https://">
          
          <div class="form-text">
            <strong>{lang_allowed_file_types}</strong> {allowed_media_types}
          </div>
        </div>
      </div>
      
      <!-- Thumbnail File -->
      <div class="mb-4 row">
        <label class="col-sm-3 col-form-label fw-bold align-self-start">
          <i class="fa-solid fa-image me-1"></i>{lang_thumb_file}
          <div class="small fw-normal text-muted mt-2">
            {lang_max_filesize}<strong>{max_thumb_filsize}</strong><br>
            {lang_max_imagewidth}<strong>{max_thumb_imagewidth}</strong><br>
            {lang_max_imageheight}<strong>{max_thumb_imageheight}</strong>
          </div>
        </label>
        <div class="col-sm-9">
          <label for="thumb_file" class="form-label"><strong>Upload:</strong></label>
          <input type="file" name="thumb_file" id="thumb_file" class="form-control mb-3">
          
          <label for="remote_thumb_file" class="form-label"><strong>URL:</strong></label>
          <input type="url" name="remote_thumb_file" id="remote_thumb_file" class="form-control mb-2" value="{remote_thumb_file}" placeholder="https://">
          
          <div class="form-text">
            <strong>{lang_allowed_file_types}</strong> {allowed_thumb_types}
          </div>
        </div>
      </div>
      
      <!-- Image Name -->
      <div class="mb-3 row">
        <label for="image_name" class="col-sm-3 col-form-label fw-bold">
          <i class="fa-solid fa-heading me-1"></i>{lang_image_name}
        </label>
        <div class="col-sm-9">
          <input type="text" name="image_name" id="image_name" class="form-control" value="{image_name}" required>
        </div>
      </div>
      
      <!-- Description -->
      <div class="mb-3 row">
        <label for="image_description" class="col-sm-3 col-form-label fw-bold align-self-start">
          <i class="fa-solid fa-align-left me-1"></i>{lang_description}
        </label>
        <div class="col-sm-9">
          <textarea name="image_description" id="image_description" class="form-control" rows="8">{image_description}</textarea>
        </div>
      </div>
      
      <!-- Keywords -->
      <div class="mb-3 row">
        <label for="image_keywords" class="col-sm-3 col-form-label fw-bold align-self-start">
          <i class="fa-solid fa-tags me-1"></i>{lang_keywords}
        </label>
        <div class="col-sm-9">
          <textarea name="image_keywords" id="image_keywords" class="form-control" rows="5">{image_keywords}</textarea>
        </div>
      </div>
      
      <!-- CAPTCHA -->
      {if captcha_upload}
      <div class="mb-3 row">
        <label for="captcha_input" class="col-sm-3 col-form-label fw-bold align-self-start">
          <i class="fa-solid fa-shield-halved me-1"></i>{lang_captcha}
        </label>
        <div class="col-sm-9">
          <div class="mb-2">
            <a href="javascript:new_captcha_image();" class="d-inline-block">
              <img src="{url_captcha_image}" border="1" id="captcha_image" alt="CAPTCHA" class="img-thumbnail">
            </a>
            <button type="button" onclick="new_captcha_image();" class="btn btn-sm btn-outline-secondary ms-2">
              <i class="fa-solid fa-arrows-rotate"></i> Neu laden
            </button>
          </div>
          <input type="text" name="captcha" id="captcha_input" class="form-control" placeholder="Code eingeben" required>
          <div class="form-text">{lang_captcha_desc}</div>
        </div>
      </div>
      {endif captcha_upload}
      
    </div>
    <div class="card-footer bg-light text-center">
      <button type="submit" name="uploadbutton" class="btn btn-success btn-lg me-2">
        <i class="fa-solid fa-cloud-arrow-up me-2"></i>{lang_submit}
      </button>
      <button type="reset" class="btn btn-secondary btn-lg">
        <i class="fa-solid fa-rotate-left me-2"></i>{lang_reset}
      </button>
    </div>
  </div>
</form>
