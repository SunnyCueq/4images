<!DOCTYPE html>
<html lang="{direction}">
<head>
  <meta charset="{charset}">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>{prepend_head_title}{site_name}</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="{detail_meta_description}{site_name}">
  <meta name="keywords" content="{detail_meta_keywords}">
  <meta name="robots" content="index,follow">
  <meta name="revisit-after" content="10 days">
  
  <!-- Bootstrap 5.3.8 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  
  <!-- FontAwesome 7 -->
  <script src="https://kit.fontawesome.com/6c6f4fc51d.js" crossorigin="anonymous"></script>
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="{template_url}/style.css">
  <link rel="shortcut icon" href="{home_url}favicon.ico">
  
  <!-- RSS Feed -->
  {if has_rss}
  <link rel="alternate" type="application/rss+xml" title="{rss_title}" href="{rss_url}">
  {endif has_rss}
  
  <!-- CAPTCHA & Gallery Functions -->
  <script>
    // CAPTCHA reload function
    let captcha_reload_count = 0;
    const captcha_image_url = "{url_captcha_image}";
    
    function new_captcha_image() {
      const img = document.getElementById('captcha_image');
      const input = document.getElementById('captcha_input');
      
      if (img) {
        img.src = captcha_image_url + (captcha_image_url.indexOf('?') === -1 ? '?' : '&') + 'c=' + captcha_reload_count;
      }
      
      if (input) {
        input.value = "";
        input.focus();
      }
      
      captcha_reload_count++;
    }
    
    // Open detail window
    function opendetailwindow() { 
      window.open('', 'detailwindow', 'toolbar=no,scrollbars=yes,resizable=yes,width=800,height=600');
    }
  </script>
</head>
