<div class="card mb-3 shadow-sm hover-shadow">
  <div class="card-body">
    <div class="d-flex align-items-start">
      <!-- Folder Icon -->
      <div class="me-3 text-primary" style="font-size: 2rem;">
        <i class="fa-solid fa-folder"></i>
      </div>
      
      <!-- Category Info -->
      <div class="flex-grow-1">
        <h5 class="card-title mb-1">
          <a href="{cat_url}" class="text-decoration-none">{cat_name}</a>
          <span class="badge bg-secondary ms-2">{num_images}</span>
          {if cat_is_new}
          <span class="badge bg-success ms-1">
            <i class="fa-solid fa-sparkles"></i> {lang_new}
          </span>
          {endif cat_is_new}
        </h5>
        
        {if cat_description}
        <p class="card-text text-muted small mb-2">{cat_description}</p>
        {endif cat_description}
        
        {if sub_cats}
        <div class="mt-2 small">
          <i class="fa-solid fa-folder-tree text-muted me-1"></i>
          <span class="text-muted">Subcategories:</span> {sub_cats}
        </div>
        {endif sub_cats}
      </div>
    </div>
  </div>
</div>
