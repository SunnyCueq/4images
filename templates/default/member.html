{header}

<!-- Breadcrumb Navigation -->
<nav aria-label="breadcrumb" class="bg-light border-bottom">
  <div class="container py-2">
    <div class="row">
      <div class="col-md-8">
        <div class="d-flex align-items-center">
          <i class="fa-solid fa-house me-2 text-muted"></i>
          {clickstream}
        </div>
      </div>
      <div class="col-md-4 text-end">
        <a href="{url_top_images}" class="btn btn-sm btn-outline-primary me-2">
          <i class="fa-solid fa-star"></i> {lang_top_images}
        </a>
        <a href="{url_new_images}" class="btn btn-sm btn-outline-success">
          <i class="fa-solid fa-sparkles"></i> {lang_new_images}
        </a>
      </div>
    </div>
  </div>
</nav>

<!-- Main Content -->
<div class="container my-4">
  <div class="row g-4">
    
    <!-- Sidebar -->
    <aside class="col-lg-3">
      <!-- User Box -->
      <div class="card mb-3 shadow-sm">
        <div class="card-header bg-primary text-white">
          <i class="fa-solid fa-user"></i> {lang_registered_user}
        </div>
        <div class="card-body">
          {user_box}
        </div>
      </div>
      
      <!-- Random Image -->
      {if random_image}
      <div class="card mb-3 shadow-sm">
        <div class="card-header bg-primary text-white">
          <i class="fa-solid fa-shuffle"></i> {lang_random_image}
        </div>
        <div class="card-body text-center">
          {random_image}
        </div>
      </div>
      {endif random_image}
    </aside>
    
    <!-- Main Content Area -->
    <main class="col-lg-9">
      
      <h1 class="mb-3">
        <i class="fa-solid fa-user-gear text-primary me-2"></i>{lang_control_panel}
      </h1>
      <hr>
      
      <!-- Alert/Message -->
      {if msg}
      <div class="alert alert-info alert-dismissible fade show" role="alert">
        <i class="fa-solid fa-circle-info me-2"></i>{msg}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
      {endif msg}
      
      <!-- Content (member profile, edit forms, etc.) -->
      {content}
      
    </main>
    
  </div>
</div>

{footer}
