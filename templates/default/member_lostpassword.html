<div class="alert alert-warning mb-4">
  <i class="fa-solid fa-circle-exclamation me-2"></i>{lang_lost_password_msg}
</div>

<form method="post" action="{url_member}">
  <div class="card shadow-sm">
    <div class="card-header bg-warning text-dark">
      <h2 class="h5 mb-0">
        <i class="fa-solid fa-key me-2"></i>{lang_lost_password}
      </h2>
    </div>
    <div class="card-body">
      <div class="input-group input-group-lg">
        <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
        <input type="email" name="user_email" class="form-control" value="{user_email}" placeholder="{lang_email}" required>
        <input type="hidden" name="action" value="sendpassword" />
        <button type="submit" class="btn btn-warning" name="submit">
          <i class="fa-solid fa-paper-plane me-1"></i>{lang_submit}
        </button>
      </div>
    </div>
  </div>
</form>
