<div class="card">
  <div class="card-header bg-primary text-white">
    <h4 class="h6 mb-0">
      <i class="fa-solid fa-comment-medical me-2"></i>{lang_post_comment}
    </h4>
  </div>
  <div class="card-body">
    <form name="commentform" action="{self}" method="post" onsubmit="postbutton.disabled=true;">
      
      <!-- Name -->
      <div class="mb-3 row">
        <label for="user_name" class="col-sm-3 col-form-label">
          <i class="fa-solid fa-user me-1"></i><strong>{lang_name}</strong>
        </label>
        <div class="col-sm-9">
          <input type="text" name="user_name" id="user_name" class="form-control" value="{user_name}" required>
        </div>
      </div>
      
      <!-- Headline -->
      <div class="mb-3 row">
        <label for="comment_headline" class="col-sm-3 col-form-label">
          <i class="fa-solid fa-heading me-1"></i><strong>{lang_headline}</strong>
        </label>
        <div class="col-sm-9">
          <input type="text" name="comment_headline" id="comment_headline" class="form-control" value="{comment_headline}" required>
        </div>
      </div>
      
      <!-- Comment Text -->
      <div class="mb-3 row">
        <label for="comment_text" class="col-sm-3 col-form-label">
          <i class="fa-solid fa-message me-1"></i><strong>{lang_comment}</strong>
        </label>
        <div class="col-sm-9">
          <textarea name="comment_text" id="comment_text" class="form-control" rows="8" required>{comment_text}</textarea>
          <div class="mt-2">
            {bbcode}
          </div>
        </div>
      </div>
      
      <!-- CAPTCHA -->
      {if captcha_comments}
      <div class="mb-3 row">
        <label for="captcha_input" class="col-sm-3 col-form-label">
          <i class="fa-solid fa-shield-halved me-1"></i><strong>{lang_captcha}</strong>
        </label>
        <div class="col-sm-9">
          <div class="mb-2">
            <a href="javascript:new_captcha_image();" class="d-inline-block">
              <img src="{url_captcha_image}" border="1" id="captcha_image" alt="CAPTCHA" class="img-thumbnail">
            </a>
            <button type="button" onclick="new_captcha_image();" class="btn btn-sm btn-outline-secondary ms-2">
              <i class="fa-solid fa-arrows-rotate"></i> Neu laden
            </button>
          </div>
          <input type="text" name="captcha" id="captcha_input" class="form-control" placeholder="Code eingeben" required>
          <div class="form-text">{lang_captcha_desc}</div>
        </div>
      </div>
      {endif captcha_comments}
      
      <!-- Submit Button -->
      <div class="row">
        <div class="col-sm-9 offset-sm-3">
          <input type="hidden" name="action" value="postcomment" />
          <input type="hidden" name="id" value="{image_id}" />
          <button type="submit" name="postbutton" class="btn btn-primary">
            <i class="fa-solid fa-paper-plane me-2"></i>{lang_post_comment}
          </button>
        </div>
      </div>
      
    </form>
  </div>
</div>
