<!-- Template file for WAV Audio Files -->
<div class="card">
  <div class="card-body text-center">
    <i class="fa-solid fa-volume-high fa-3x text-info mb-3"></i>
    <audio controls class="w-100" preload="metadata">
      <source src="{media_src}" type="audio/wav">
      Your browser does not support the audio element.
    </audio>
  </div>
</div>
