<!-- Template file for Flash Movies -->
<div class="card border-warning">
  <div class="card-body text-center">
    <i class="fa-solid fa-bolt fa-3x text-warning mb-3"></i>
    <h5 class="text-warning">Adobe Flash (SWF)</h5>
    <p class="text-muted small">
      Flash Player is no longer supported by modern browsers.<br>
      Download the file to view offline.
    </p>
    {media_icon}
    <div class="mt-3">
      <a href="{media_src}" class="btn btn-warning btn-sm" download>
        <i class="fa-solid fa-download me-1"></i>Download SWF
      </a>
    </div>
  </div>
</div>
