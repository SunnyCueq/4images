<!-- Template file for RealMedia Files -->
<div class="card">
  <div class="card-body text-center">
    <i class="fa-solid fa-video fa-3x text-danger mb-3"></i>
    <p class="text-muted">RealMedia playback requires RealPlayer plugin</p>
    {media_icon}
    <div class="mt-2">
      <a href="{media_src}" class="btn btn-outline-primary btn-sm" target="_blank" rel="noopener">
        <i class="fa-solid fa-play me-1"></i>Open in RealPlayer
      </a>
    </div>
  </div>
</div>
