<form action="{url_login}" method="post">
  <!-- Username -->
  <div class="mb-3">
    <label for="user_name" class="form-label">
      <i class="fa-solid fa-user"></i> {lang_user_name}
    </label>
    <input type="text" class="form-control" id="user_name" name="user_name" required>
  </div>
  
  <!-- Password -->
  <div class="mb-3">
    <label for="user_password" class="form-label">
      <i class="fa-solid fa-lock"></i> {lang_password}
    </label>
    <input type="password" class="form-control" id="user_password" name="user_password" required>
  </div>
  
  <!-- Auto Login Checkbox -->
  <div class="mb-3 form-check">
    <input type="checkbox" class="form-check-input" id="auto_login" name="auto_login" value="1">
    <label class="form-check-label" for="auto_login">
      {lang_auto_login}
    </label>
  </div>
  
  <!-- Submit Button -->
  <button type="submit" class="btn btn-primary w-100">
    <i class="fa-solid fa-right-to-bracket"></i> {lang_login}
  </button>
  
  <!-- Links -->
  <div class="mt-3 text-center small">
    <a href="{url_lost_password}" class="text-decoration-none">
      <i class="fa-solid fa-key"></i> {lang_lost_password}
    </a>
    <span class="mx-2">•</span>
    <a href="{url_register}" class="text-decoration-none">
      <i class="fa-solid fa-user-plus"></i> {lang_register}
    </a>
  </div>
</form>
