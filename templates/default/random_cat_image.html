<div class="text-center">
  {thumbnail}
  <div class="mt-2">
    {image_name}
    {if image_is_new}<span class="badge bg-warning text-dark ms-1"><i class="fa-solid fa-sparkles"></i> {lang_new}</span>{endif image_is_new}
  </div>
  {if allow_comments}
  <div class="small text-muted">
    <i class="fa-solid fa-comments me-1"></i>{lang_comments} {image_comments}
  </div>
  {endif allow_comments}
  <div class="small text-muted">{user_name}</div>
</div>
