<form method="post" action="{url_member}" enctype="multipart/form-data" onsubmit="uploadbutton.disabled=true;">
  <input type="hidden" name="action" value="deleteimage" />
  <input type="hidden" name="image_id" value="{image_id}" />
  
  <div class="card shadow-sm border-danger">
    <div class="card-header bg-danger text-white">
      <h2 class="h5 mb-0">
        <i class="fa-solid fa-triangle-exclamation me-2"></i>{lang_delete_image}
      </h2>
    </div>
    <div class="card-body text-center py-5">
      <i class="fa-solid fa-trash-can fa-4x text-danger mb-4"></i>
      <p class="lead">{lang_delete_image_confirm}</p>
    </div>
    <div class="card-footer bg-light text-center">
      <button type="submit" name="uploadbutton" class="btn btn-danger btn-lg me-2">
        <i class="fa-solid fa-check me-2"></i>{lang_yes}
      </button>
      <button type="button" class="btn btn-secondary btn-lg" onclick="javascript:history.go(-1)">
        <i class="fa-solid fa-times me-2"></i>{lang_no}
      </button>
    </div>
  </div>
</form>
