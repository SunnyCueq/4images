<form method="post" action="{url_search}">
  <div class="card shadow-sm">
    <div class="card-header bg-primary text-white">
      <h3 class="h5 mb-0">
        <i class="fa-solid fa-magnifying-glass me-2"></i>{lang_search}
      </h3>
    </div>
    <div class="card-body">
      
      <!-- Search by Keyword -->
      <div class="mb-4 row">
        <label for="search_keywords" class="col-sm-3 col-form-label fw-bold">
          <i class="fa-solid fa-keyboard me-1"></i>{lang_search_by_keyword}
        </label>
        <div class="col-sm-9">
          <input type="text" name="search_keywords" id="search_keywords" class="form-control mb-2" value="{search_keywords}" placeholder="{lang_search_by_keyword}">
          <div class="form-check">
            <input type="checkbox" name="search_new_images" value="1" class="form-check-input" id="search_new_images">
            <label class="form-check-label" for="search_new_images">
              <i class="fa-solid fa-sparkles me-1"></i>{lang_new_images_only}
            </label>
          </div>
        </div>
      </div>
      
      <!-- Search by Username -->
      <div class="mb-4 row">
        <label for="search_user" class="col-sm-3 col-form-label fw-bold">
          <i class="fa-solid fa-user me-1"></i>{lang_search_by_username}
        </label>
        <div class="col-sm-9">
          <input type="text" name="search_user" id="search_user" class="form-control" value="{search_user}" placeholder="{lang_search_by_username}">
        </div>
      </div>
      
      <!-- Search Terms (AND/OR) -->
      <div class="mb-4 row">
        <label class="col-sm-3 col-form-label fw-bold">
          <i class="fa-solid fa-code-branch me-1"></i>{lang_search_terms}
        </label>
        <div class="col-sm-9">
          <div class="form-check form-check-inline">
            <input type="radio" name="search_terms" value="any" class="form-check-input" id="terms_any" checked>
            <label class="form-check-label" for="terms_any">{lang_or}</label>
          </div>
          <div class="form-check form-check-inline">
            <input type="radio" name="search_terms" value="all" class="form-check-input" id="terms_all">
            <label class="form-check-label" for="terms_all">{lang_and}</label>
          </div>
        </div>
      </div>
      
      <!-- Category -->
      <div class="mb-4 row">
        <label class="col-sm-3 col-form-label fw-bold">
          <i class="fa-solid fa-folder me-1"></i>{lang_category}
        </label>
        <div class="col-sm-9">
          {category_dropdown}
        </div>
      </div>
      
      <!-- Search Fields -->
      <div class="mb-4 row">
        <label class="col-sm-3 col-form-label fw-bold align-self-start">
          <i class="fa-solid fa-list-check me-1"></i>{lang_search_fields}
        </label>
        <div class="col-sm-9">
          <div class="row g-2">
            <div class="col-md-6">
              <div class="form-check">
                <input type="radio" name="search_fields" value="all" class="form-check-input" id="fields_all" checked>
                <label class="form-check-label" for="fields_all">{lang_all_fields}</label>
              </div>
              <div class="form-check">
                <input type="radio" name="search_fields" value="image_description" class="form-check-input" id="fields_desc">
                <label class="form-check-label" for="fields_desc">{lang_description_only}</label>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-check">
                <input type="radio" name="search_fields" value="image_name" class="form-check-input" id="fields_name">
                <label class="form-check-label" for="fields_name">{lang_name_only}</label>
              </div>
              <div class="form-check">
                <input type="radio" name="search_fields" value="image_keywords" class="form-check-input" id="fields_keywords">
                <label class="form-check-label" for="fields_keywords">{lang_keywords_only}</label>
              </div>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Submit Button -->
      <div class="row">
        <div class="col-sm-9 offset-sm-3">
          <button type="submit" class="btn btn-primary btn-lg">
            <i class="fa-solid fa-magnifying-glass me-2"></i>{lang_search}
          </button>
        </div>
      </div>
      
    </div>
  </div>
</form>
