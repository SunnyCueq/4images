{header}

<!-- Breadcrumb Navigation -->
<nav aria-label="breadcrumb" class="bg-light border-bottom">
  <div class="container py-2">
    <div class="row">
      <div class="col-md-8">
        <div class="d-flex align-items-center">
          <i class="fa-solid fa-house me-2 text-muted"></i>
          {clickstream}
        </div>
      </div>
      <div class="col-md-4 text-end">
        <a href="{url_top_images}" class="btn btn-sm btn-outline-primary me-2">
          <i class="fa-solid fa-star"></i> {lang_top_images}
        </a>
        <a href="{url_new_images}" class="btn btn-sm btn-outline-success">
          <i class="fa-solid fa-sparkles"></i> {lang_new_images}
        </a>
      </div>
    </div>
  </div>
</nav>

<!-- Main Content -->
<div class="container my-4">
  <div class="row g-4">
    
    <!-- Sidebar -->
    <aside class="col-lg-3">
      <!-- User Box -->
      <div class="card mb-3 shadow-sm">
        <div class="card-header bg-primary text-white">
          <i class="fa-solid fa-user"></i> {lang_registered_user}
        </div>
        <div class="card-body">
          {user_box}
        </div>
      </div>
      
      <!-- Random Image -->
      {if random_image}
      <div class="card mb-3 shadow-sm">
        <div class="card-header bg-primary text-white">
          <i class="fa-solid fa-shuffle"></i> {lang_random_image}
        </div>
        <div class="card-body text-center">
          {random_image}
        </div>
      </div>
      {endif random_image}
    </aside>
    
    <!-- Main Content Area -->
    <main class="col-lg-9">
      
      <h1 class="mb-3 text-danger">
        <i class="fa-solid fa-triangle-exclamation me-2"></i>{lang_error}
      </h1>
      <hr>
      
      <!-- Error Message -->
      <div class="alert alert-danger shadow-sm" role="alert">
        <h4 class="alert-heading">
          <i class="fa-solid fa-circle-exclamation me-2"></i>Error
        </h4>
        <p class="mb-0">{error_msg}</p>
      </div>
      
      <!-- Category Dropdown & Items Per Page -->
      <div class="d-flex justify-content-between align-items-center mt-4 flex-wrap gap-3">
        <div>{category_dropdown_form}</div>
        <div>{setperpage_dropdown_form}</div>
      </div>
      
    </main>
    
  </div>
</div>

{footer}
